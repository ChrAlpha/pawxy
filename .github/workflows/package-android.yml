name: Package Android

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  package-android:
    name: Build Android package
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANDROID_NDK_VERSION: "27.2.12479018"
      CARGO_NDK_VERSION: "4.1.2"
      APK_SOURCE: android/app/build/outputs/apk/debug/app-debug.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Rust build inputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-ndk
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ env.CARGO_NDK_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.CARGO_NDK_VERSION }}-
            ${{ runner.os }}-cargo-

      - name: Prepare Android SDK and NDK
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "${SDKMANAGER}" --licenses >/dev/null || true
          "${SDKMANAGER}" "platforms;android-35" "build-tools;35.0.0" "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Prepare Rust Android targets
        shell: bash
        run: |
          set -euo pipefail
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android
          if ! cargo ndk --version | grep -F "cargo-ndk ${CARGO_NDK_VERSION}" >/dev/null 2>&1; then
            cargo install cargo-ndk --version "${CARGO_NDK_VERSION}" --locked
          fi

      - name: Verify source gates
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          sh -n scripts/pawxyctl
          sh -n scripts/test-pawxyctl.sh
          sh -n scripts/package-android.sh
          sh -n scripts/test-package-android.sh
          sh -n scripts/build-android.sh
          sh -n scripts/install-apk-adb.sh
          sh -n scripts/test-install-apk-adb.sh
          sh -n scripts/install-android.sh
          sh -n scripts/check-android-apk-compat.sh
          sh -n scripts/test-install-android.sh
          sh -n scripts/test-android-device.sh
          sh -n scripts/test-android-device-mock.sh
          sh -n scripts/test-android-vm.sh
          sh -n scripts/test-android-vm-mock.sh
          sh -n scripts/check-best-practices.sh
          sh -n scripts/test-public-readiness.sh
          scripts/test-pawxyctl.sh
          scripts/test-package-android.sh
          scripts/test-install-apk-adb.sh
          scripts/test-install-android.sh
          scripts/test-android-device-mock.sh
          scripts/test-android-vm-mock.sh
          scripts/check-best-practices.sh

      - name: Build Android APK
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-android.sh
          scripts/check-android-apk-compat.sh
          PAWXY_SKIP_RUST_GATES=1 PAWXY_SKIP_ANDROID_BUILD=1 PAWXY_SKIP_RUNTIME=1 scripts/test-public-readiness.sh

      - name: Assemble package files
        shell: bash
        run: |
          set -euo pipefail
          PAWXY_APK_SOURCE="${APK_SOURCE}" PAWXY_PACKAGE_VERSION="${GITHUB_REF_NAME:-manual}" scripts/package-android.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: pawxy-android-package
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  upload-release-assets:
    name: Upload release assets
    if: github.event_name == 'release'
    needs:
      - package-android
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      actions: read

    steps:
      - name: Download packaged files
        uses: actions/download-artifact@v8
        with:
          name: pawxy-android-package
          path: dist

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
